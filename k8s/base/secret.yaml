# ExternalSecret — pulls all application secrets from AWS Secrets Manager at deploy time.
# Requires External Secrets Operator (https://external-secrets.io/) to be installed.
# Bootstrap: kubectl apply -k k8s/cert-manager && helm install eso external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: socialflow-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: socialflow-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: socialflow/app
        property: DATABASE_URL
    - secretKey: REDIS_HOST
      remoteRef:
        key: socialflow/app
        property: REDIS_HOST
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: socialflow/app
        property: REDIS_PASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: socialflow/app
        property: JWT_SECRET
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: socialflow/app
        property: JWT_REFRESH_SECRET
    - secretKey: TWITTER_API_KEY
      remoteRef:
        key: socialflow/app
        property: TWITTER_API_KEY
    - secretKey: TWITTER_API_SECRET
      remoteRef:
        key: socialflow/app
        property: TWITTER_API_SECRET
