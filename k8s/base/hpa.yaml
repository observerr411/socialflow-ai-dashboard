apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: socialflow-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: socialflow-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Scale out when any BullMQ queue has more than 50 waiting jobs.
    # Requires the Prometheus Adapter with a custom metric rule mapping
    # the bullmq_queue_waiting gauge to this external metric name.
    - type: External
      external:
        metric:
          name: bullmq_queue_waiting
          selector:
            matchLabels:
              app: socialflow-backend
        target:
          type: AverageValue
          averageValue: "50"
