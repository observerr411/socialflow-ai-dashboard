# ClusterSecretStore — configures ESO to authenticate with AWS Secrets Manager.
# The IAM role ARN is injected per-environment via a Kustomize patch on the annotation.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: socialflow-backend
            namespace: socialflow-dev
